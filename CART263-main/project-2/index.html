    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;

        #intro-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(0,10,30,0.97) 0%, rgba(0,30,60,0.95) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.7s ease;
        }
        #intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #intro-overlay h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            margin: 0 0 0.3em;
            text-shadow: 0 0 30px rgba(100,200,255,0.6);
            color: #e0f7ff;
        }
        #intro-overlay .subtitle {
            font-size: 1.05rem;
            color: #90caf9;
            margin-bottom: 2.4em;
            letter-spacing: 0.05em;
        }
        #intro-overlay .controls-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.55em 1.4em;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 1.4em 2em;
            margin-bottom: 2.2em;
            max-width: 420px;
            width: 90%;
        }
        #intro-overlay .key {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            padding: 0.18em 0.65em;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.05em;
            color: #fff;
            white-space: nowrap;
            align-self: center;
        }
        #intro-overlay .desc {
            font-size: 0.9rem;
            color: #b0bec5;
            align-self: center;
        }
        #intro-overlay .enter-btn {
            background: linear-gradient(135deg, #0288d1, #0097a7);
            border: none;
            border-radius: 30px;
            padding: 0.75em 2.8em;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            letter-spacing: 0.08em;
            box-shadow: 0 4px 24px rgba(0,150,255,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        #intro-overlay .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,180,255,0.5);
        }
        #intro-overlay .note {
            margin-top: 1.1em;
            font-size: 0.78rem;
            color: #546e7a;

    <!-- GPU bird position shader -->
    <script id="fragmentShaderPosition" type="x-shader/x-fragment">
        uniform float time;
        uniform float delta;
        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec4 tmpPos = texture2D( texturePosition, uv );
            vec3 position = tmpPos.xyz;
            vec3 velocity = texture2D( textureVelocity, uv ).xyz;
            float phase = tmpPos.w;
            phase = mod( ( phase + delta +
                length( velocity.xz ) * delta * 3. +
                max( velocity.y, 0.0 ) * delta * 6. ), 62.83 );
            gl_FragColor = vec4( position + velocity * delta * 30., phase );
        }
    </script>

    <!-- GPU bird velocity shader -->
    <script id="fragmentShaderVelocity" type="x-shader/x-fragment">
        uniform float time;
        uniform float testing;
        uniform float delta;
        uniform float separationDistance;
        uniform float alignmentDistance;
        uniform float cohesionDistance;
        uniform float freedomFactor;
        uniform vec3 predator;
        uniform sampler2D terrainMap;
        uniform float terrainOffset;
        uniform float terrainScale;
        uniform float birdMeshOffsetY;
        const float width = resolution.x;
        const float height = resolution.y;
        const float PI = 3.141592653589793;
        const float PI_2 = PI * 2.0;
        float zoneRadius = 40.0;
        float zoneRadiusSquared = 1600.0;
        float separationThresh = 0.45;
        float alignmentThresh = 0.65;
        const float UPPER_BOUNDS = BOUNDS;
        const float LOWER_BOUNDS = -UPPER_BOUNDS;
        const float SPEED_LIMIT = 20.0;
        float rand( vec2 co ) {
            return fract( sin( dot( co.xy, vec2(12.9898,78.233) ) ) * 43758.5453 );
        }
        void main() {
            zoneRadius = separationDistance + alignmentDistance + cohesionDistance;
            separationThresh = separationDistance / zoneRadius;
            alignmentThresh = ( separationDistance + alignmentDistance ) / zoneRadius;
            zoneRadiusSquared = zoneRadius * zoneRadius;
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec3 birdPosition, birdVelocity;
            vec3 selfPosition = texture2D( texturePosition, uv ).xyz;
            vec3 selfVelocity = texture2D( textureVelocity, uv ).xyz;
            float dist;
            vec3 dir;
            float distSquared;
            float separationSquared = separationDistance * separationDistance;
            float cohesionSquared = cohesionDistance * cohesionDistance;
            float f;
            float percent;
            vec3 velocity = selfVelocity;
            float limit = SPEED_LIMIT;
            dir = predator * UPPER_BOUNDS - selfPosition;
            dir.z = 0.;
            dist = length( dir );
            distSquared = dist * dist;
            float preyRadius = 150.0;
            float preyRadiusSq = preyRadius * preyRadius;
            if ( dist < preyRadius ) {
                f = ( distSquared / preyRadiusSq - 1.0 ) * delta * 100.;
                velocity += normalize( dir ) * f;
                limit += 5.0;
            }
            vec3 central = vec3( 0., 0., 0. );
            dir = selfPosition - central;
            dist = length( dir );
            dir.y *= 1.0;
            velocity -= normalize( dir ) * delta * 3.;
            // Keep birds from dropping too low in simulation space
            if ( selfPosition.y < 200.0 ) velocity.y += delta * 10.;
            for ( float y = 0.0; y < height; y++ ) {
                for ( float x = 0.0; x < width; x++ ) {
                    vec2 ref = vec2( x + 0.5, y + 0.5 ) / resolution.xy;
                    birdPosition = texture2D( texturePosition, ref ).xyz;
                    dir = birdPosition - selfPosition;
                    dist = length( dir );
                    if ( dist < 0.0001 ) continue;
                    distSquared = dist * dist;
                    if ( distSquared > zoneRadiusSquared ) continue;
                    percent = distSquared / zoneRadiusSquared;
                    if ( percent < separationThresh ) {
                        f = ( separationThresh / percent - 1.0 ) * delta;
                        velocity -= normalize( dir ) * f;
                    } else if ( percent < alignmentThresh ) {
                        float threshDelta = alignmentThresh - separationThresh;
                        float adjustedPercent = ( percent - separationThresh ) / threshDelta;
                        birdVelocity = texture2D( textureVelocity, ref ).xyz;
                        f = ( 0.5 - cos( adjustedPercent * PI_2 ) * 0.5 + 0.5 ) * delta;
                        velocity += normalize( birdVelocity ) * f;
                    } else {
                        float threshDelta = 1.0 - alignmentThresh;
                        float adjustedPercent;
                        if ( threshDelta == 0. ) adjustedPercent = 1.;
                        else adjustedPercent = ( percent - alignmentThresh ) / threshDelta;
                        f = ( 0.5 - ( cos( adjustedPercent * PI_2 ) * -0.5 + 0.5 ) ) * delta;
                        velocity += normalize( dir ) * f;
                    }
                }
            }
            if ( length( velocity ) > limit ) {
                velocity = normalize( velocity ) * limit;
            }

            // Terrain collision — account for birdMesh.rotation.y = PI/2:
            // worldX = selfPosition.z, worldZ = -selfPosition.x
            float worldY = selfPosition.y + birdMeshOffsetY;
            float worldX = selfPosition.z;
            float worldZ = -selfPosition.x;
            vec2 terrainUV = clamp( (vec2(worldX, worldZ) + 3750.0) / 7500.0, 0.0, 1.0 );
            float terrainH = texture2D( terrainMap, terrainUV ).r * terrainScale + terrainOffset;
            float margin = 350.0;
            float clearance = worldY - terrainH;
            if ( clearance < margin ) {
                float urgency = 1.0 - clamp( clearance / margin, 0.0, 1.0 );
                // Directly override — cannot be cancelled by speed cap
                velocity.y = max( velocity.y, urgency * SPEED_LIMIT * 3.0 );
            }

            gl_FragColor = vec4( velocity, 1.0 );
        }
    </script>

        <!-- Intro overlay -->
        <div id="intro-overlay">
            <h1>NATURE SCENE</h1>

            <div class="controls-grid">

                <span class="desc">Fly up</span>

                <span class="key">C</span>
                <span class="desc">Fly down</span>

            </div>

            <button class="enter-btn" id="enter-btn">Enter World</button>
            <p class="note">Press Esc at any time to unlock the pointer</p>
        </div>

        <main></main>

        <script>
            document.getElementById('enter-btn').addEventListener('click', function () {
                const overlay = document.getElementById('intro-overlay');
                overlay.classList.add('hidden');
                setTimeout(() => overlay.remove(), 700);
            });
